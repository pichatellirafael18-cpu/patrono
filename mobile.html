<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Mobile - O Enigma</title>
    <!-- Reaproveitamos parte do seu estilo existente para não ficar feio -->
    <style>
        body {
            background-color: #0a0808;
            color: #e0d0c0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(20, 10, 10, 0.9);
            border: 2px solid #D4AF37;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px rgba(212, 175, 55, 0.3);
            max-width: 400px;
        }
        h1 { 
            color: #D4AF37; 
            margin-bottom: 20px;
        }
        p { 
            line-height: 1.6; 
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visão Limitada</h1>
        <p>A percepção da sua jornada foi alterada. Você está tentando acessar através de um dispositivo móvel!</p>
        <p style="color: #8B0000; font-weight: bold; margin-top: 20px;">
            Para uma experiência completa e imersiva na saga, é necessário utilizar um desbravador de mesa (Computador).
        </p>
    </div>
</body>
</html>
