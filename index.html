<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Saga do Mensageiro - Redirecionamento</title>
    <script>
        // Função para verificar se é um dispositivo móvel
        function checkDeviceAndRedirect() {
            // Verifica o userAgent do navegador buscando por identificadores de dispositivos móveis
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                // Caso seja mobile, redireciona automaticamente para mobile.html
                window.location.href = "mobile.html";
            } else {
                // Caso seja desktop, redireciona automaticamente para enigma.html
                window.location.href = "enigma.html";
            }
        }

        // Executa a verificação assim que o script é lido
        checkDeviceAndRedirect();
    </script>
</head>
<body style="background-color: #0a0808; color: #D4AF37; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0;">
    <!-- O redirecionamento é muito rápido, mas caso demore, exibimos esta mensagem mística -->
    <h3>Avaliando sua essência e conduzindo ao destino correto...</h3>
</body>
</html>
